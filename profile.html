<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earthbux — Your Profile</title>
  <link rel="stylesheet" href="resources/css/ebx_frontend.css" />
  <style>

    /* ── New profile onboarding flow ── */
    .onboarding {
      min-height: calc(100vh - var(--nav-height));
      background: #0f1a14;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-2xl) var(--sp-lg);
    }

    .onboarding__card {
      width: 100%;
      max-width: 560px;
      background: rgba(30,42,30,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    /* Progress bar across top */
    .onboarding__progress {
      height: 3px;
      background: rgba(255,255,255,0.06);
    }

    .onboarding__progress-fill {
      height: 100%;
      background: var(--clr-amber);
      transition: width 0.4s ease;
    }

    .onboarding__body {
      padding: var(--sp-2xl) var(--sp-xl);
    }

    .onboarding__step-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--clr-honey);
      opacity: 0.7;
      margin-bottom: var(--sp-sm);
    }

    .onboarding__title {
      color: var(--clr-parchment);
      font-size: 1.5rem;
      margin-bottom: var(--sp-sm);
    }

    .onboarding__subtitle {
      color: rgba(245,240,232,0.5);
      font-size: 0.88rem;
      line-height: 1.65;
      margin-bottom: var(--sp-xl);
    }

    /* Form fields */
    .ob-field {
      margin-bottom: var(--sp-lg);
    }

    .ob-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(245,240,232,0.7);
      margin-bottom: var(--sp-xs);
      letter-spacing: 0.02em;
    }

    .ob-label span {
      font-weight: 400;
      opacity: 0.5;
      font-size: 0.72rem;
    }

    .ob-input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      color: var(--clr-parchment);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .ob-input:focus {
      border-color: var(--clr-amber);
    }

    .ob-input::placeholder {
      color: rgba(245,240,232,0.2);
    }

    .ob-input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-md);
    }

    /* Cause interest selector */
    .cause-picker {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px,1fr));
      gap: var(--sp-sm);
    }

    .cause-pick {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      padding: 10px 12px;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }

    .cause-pick:hover {
      border-color: rgba(255,255,255,0.2);
    }

    .cause-pick.selected {
      border-color: var(--pick-color, var(--clr-amber));
      background: color-mix(in srgb, var(--pick-color, var(--clr-amber)) 10%, transparent);
    }

    .cause-pick input[type="checkbox"] {
      display: none;
    }

    .cause-pick__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cause-pick__name {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(245,240,232,0.7);
    }

    .cause-pick.selected .cause-pick__name {
      color: rgba(245,240,232,0.95);
    }

    /* Donation amount tiles */
    .amount-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--sp-sm);
      margin-bottom: var(--sp-md);
    }

    .amount-tile {
      padding: 12px 8px;
      text-align: center;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      background: none;
      color: rgba(245,240,232,0.65);
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .amount-tile:hover {
      border-color: rgba(255,255,255,0.25);
      color: var(--clr-parchment);
    }

    .amount-tile.selected {
      border-color: var(--clr-amber);
      background: rgba(201,124,42,0.12);
      color: var(--clr-honey);
    }

    .amount-tile__sub {
      display: block;
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 400;
      opacity: 0.5;
      margin-top: 2px;
    }

    /* Type choice: benefactor vs org */
    .type-choice {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-md);
    }

    .type-card {
      padding: var(--sp-lg);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s;
      background: none;
      text-align: left;
    }

    .type-card:hover {
      border-color: rgba(255,255,255,0.2);
    }

    .type-card.selected {
      border-color: var(--clr-amber);
      background: rgba(201,124,42,0.08);
    }

    .type-card__icon {
      font-size: 1.5rem;
      margin-bottom: var(--sp-sm);
    }

    .type-card__title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--clr-parchment);
      margin-bottom: 4px;
    }

    .type-card__desc {
      font-size: 0.75rem;
      color: rgba(245,240,232,0.45);
      line-height: 1.5;
    }

    /* Navigation buttons */
    .onboarding__actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--sp-xl);
      padding-top: var(--sp-lg);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .ob-back {
      font-size: 0.82rem;
      color: rgba(245,240,232,0.35);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .ob-back:hover { color: rgba(245,240,232,0.65); }

    /* Step dots */
    .step-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .step-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.2s, transform 0.2s;
    }

    .step-dot.active {
      background: var(--clr-amber);
      transform: scale(1.3);
    }

    .step-dot.done {
      background: rgba(245,240,232,0.4);
    }

    /* ── Existing profile view ── */
    .profile-layout {
      display: grid;
      grid-template-columns: 240px 1fr 280px;
      gap: var(--sp-xl);
      align-items: start;
      padding: var(--sp-2xl) 0;
    }

    @media (max-width: 1100px) {
      .profile-layout { grid-template-columns: 220px 1fr; }
      .profile-choices-col { display: none; }
    }
    @media (max-width: 720px) {
      .profile-layout { grid-template-columns: 1fr; }
    }

    .profile-sidebar {
      position: sticky;
      top: calc(var(--nav-height) + var(--sp-lg));
    }

    .profile-card {
      background: var(--clr-forest);
      border-radius: var(--radius-lg);
      padding: var(--sp-xl);
      color: var(--clr-parchment);
      margin-bottom: var(--sp-lg);
    }

    .profile-card__avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: var(--sp-md);
      color: var(--clr-honey);
    }

    .profile-card__handle {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      opacity: 0.5;
      margin-bottom: var(--sp-xs);
    }

    .profile-card__name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: var(--sp-sm);
    }

    .profile-card__type {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--clr-honey);
      opacity: 0.7;
    }

    .wallet-card {
      background: white;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      padding: var(--sp-lg);
      margin-bottom: var(--sp-lg);
    }

    .wallet-card__label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--clr-ink-light);
      margin-bottom: var(--sp-xs);
    }

    .wallet-card__balance {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 900;
      color: var(--clr-earth);
      margin-bottom: 4px;
    }

    .wallet-card__sub {
      font-size: 0.75rem;
      color: var(--clr-ink-light);
      margin-bottom: var(--sp-md);
    }

    /* Credit badge section */
    .credits-section {
      background: white;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      padding: var(--sp-lg);
    }

    .credits-section__title {
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: var(--sp-md);
      color: var(--clr-earth);
    }

    .credit-badge-row {
      display: flex;
      align-items: center;
      gap: var(--sp-md);
      padding: var(--sp-sm) 0;
      border-bottom: 1px solid var(--clr-border);
      cursor: pointer;
      transition: background 0.15s;
      border-radius: var(--radius-sm);
    }

    .credit-badge-row:last-child { border-bottom: none; }
    .credit-badge-row:hover { background: var(--clr-surface); }

    .credit-badge-row__info { flex: 1; }

    .credit-badge-row__title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--clr-earth);
    }

    .credit-badge-row__meta {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--clr-ink-light);
    }

    /* ── Upcoming cause banner (b) ── */
    .upcoming-banner {
      background: #0f1a14;
      border-radius: var(--radius-md);
      padding: var(--sp-lg);
      margin-bottom: var(--sp-lg);
      color: var(--clr-parchment);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .upcoming-banner__eyebrow {
      font-family: var(--font-mono);
      font-size: 0.6rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(245,240,232,0.4);
      margin-bottom: var(--sp-sm);
    }
    .upcoming-banner__rows {
      display: flex; flex-direction: column; gap: 10px;
    }
    .upcoming-banner__row {
      display: flex; align-items: center; gap: var(--sp-md);
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius-sm);
      border-left: 3px solid rgba(255,255,255,0.1);
      cursor: pointer; transition: background 0.15s;
      text-decoration: none;
    }
    .upcoming-banner__row:hover { background: rgba(255,255,255,0.07); }
    .upcoming-banner__row--cause { border-left-color: var(--clr-honey); }
    .upcoming-banner__row--org   { border-left-color: var(--clr-moss); }
    .upcoming-banner__row-label {
      font-family: var(--font-mono); font-size: 0.6rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(245,240,232,0.4); flex-shrink: 0; width: 64px;
    }
    .upcoming-banner__row-choice {
      flex: 1; font-size: 0.85rem; font-weight: 600;
      color: var(--clr-parchment); line-height: 1.3;
    }
    .upcoming-banner__row-meta {
      font-family: var(--font-mono); font-size: 0.7rem;
      color: rgba(245,240,232,0.5); text-align: right; flex-shrink: 0;
    }
    .upcoming-banner__row-timer {
      font-family: var(--font-mono); font-size: 0.68rem;
      color: var(--clr-honey); margin-top: 2px;
    }

    /* ── Choices table (d) ── */
    .choices-col-card {
      background: white;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .choices-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-md) var(--sp-lg);
      border-bottom: 1px solid var(--clr-border);
      background: var(--clr-surface);
    }
    .choices-col-title {
      font-family: var(--font-mono); font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--clr-ink-muted); font-weight: 600;
    }
    .choices-toggle {
      display: flex; gap: 4px;
    }
    .choices-toggle button {
      padding: 3px 10px;
      font-family: var(--font-mono); font-size: 0.6rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid var(--clr-border); border-radius: 3px;
      background: none; color: var(--clr-ink-muted); cursor: pointer;
    }
    .choices-toggle button.active {
      background: var(--clr-forest); color: white; border-color: var(--clr-forest);
    }
    .choices-table { width: 100%; border-collapse: collapse; }
    .choices-table td {
      padding: 8px 12px; border-bottom: 1px solid rgba(212,206,194,0.3);
      font-size: 0.78rem; color: var(--clr-ink-muted);
    }
    .choices-table tbody tr:last-child td { border-bottom: none; }
    .choices-table tbody tr:hover td { background: rgba(78,122,78,0.03); }
    .choices-table .cause-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 6px; flex-shrink: 0;
    }
    .choices-table .choice-link {
      font-weight: 600; color: var(--clr-earth);
      text-decoration: none;
    }
    .choices-table .choice-link:hover { text-decoration: underline; }
    .choices-table .no-choice { color: var(--clr-ink-light); font-style: italic; }

    /* ── Feed history (e) ── */
    .profile-feed-history {
      background: var(--clr-bg);
    }
    .profile-feed-eyebrow {
      font-family: var(--font-mono); font-size: 0.6rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--clr-ink-light); margin-bottom: var(--sp-md);
    }
    /* ── EN strip on profile (moved from index.html, pass 12) ── */
    .profile-en-strip { margin-bottom: var(--sp-2xl); }
    .profile-en-strip__header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: var(--sp-md);
    }
    .profile-en-strip__more {
      font-family: var(--font-mono); font-size: 0.7rem;
      color: var(--clr-moss); text-decoration: none;
    }
    .profile-en-strip__grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-md);
    }
    @media (max-width: 700px) {
      .profile-en-strip__grid { grid-template-columns: 1fr; }
    }

    /* Main content area */
    .profile-main {}

    .profile-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--clr-border);
      margin-bottom: var(--sp-xl);
    }

    .profile-tab {
      padding: var(--sp-md) var(--sp-lg);
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--clr-ink-muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      transition: color 0.2s, border-color 0.2s;
    }

    .profile-tab:hover { color: var(--clr-ink); }

    .profile-tab.active {
      color: var(--clr-earth);
      border-bottom-color: var(--clr-amber);
    }

    .profile-panel { display: none; }
    .profile-panel.active { display: block; }

    /* Activity feed items */
    .activity-item {
      display: flex;
      gap: var(--sp-md);
      padding: var(--sp-md) 0;
      border-bottom: 1px solid var(--clr-border);
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-item__icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--clr-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .activity-item__body { flex: 1; }

    .activity-item__text {
      font-size: 0.85rem;
      color: var(--clr-ink-muted);
      line-height: 1.5;
    }

    .activity-item__time {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--clr-ink-light);
      margin-top: 2px;
    }

    /* Settings form */
    .settings-group {
      background: white;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      padding: var(--sp-lg);
      margin-bottom: var(--sp-lg);
    }

    .settings-group__title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--clr-earth);
      margin-bottom: var(--sp-lg);
      padding-bottom: var(--sp-sm);
      border-bottom: 1px solid var(--clr-border);
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--sp-sm) 0;
      border-bottom: 1px solid var(--clr-border);
      gap: var(--sp-md);
    }

    .settings-row:last-child { border-bottom: none; }

    .settings-row__label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--clr-ink);
    }

    .settings-row__sub {
      font-size: 0.75rem;
      color: var(--clr-ink-light);
      margin-top: 1px;
    }

    .toggle {
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: var(--clr-border);
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .toggle.on { background: var(--clr-moss); }

    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle.on::after { transform: translateX(18px); }

    /* ── Pass 34 overhaul — drawing layout ── */
    .pf-grid {
      display: grid;
      grid-template-columns: 260px 1fr 220px;
      gap: var(--sp-xl);
      align-items: start;
      padding: var(--sp-2xl) 0;
    }
    @media (max-width: 1100px) { .pf-grid { grid-template-columns: 240px 1fr; } .pf-right { grid-column: 1 / -1; flex-direction: row; align-items: center; } }
    @media (max-width: 720px)  { .pf-grid { grid-template-columns: 1fr; } .pf-right { flex-direction: column; } }

    .pf-left { display: flex; flex-direction: column; gap: var(--sp-lg); }

    /* CreditCoin Wallet — horizontal scroll strip */
    .wallet-strip-card {
      background: white; border: 1px solid var(--clr-border);
      border-radius: var(--radius-md); overflow: hidden;
    }
    .wallet-strip-card__head {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-md) var(--sp-lg);
      border-bottom: 1px solid var(--clr-border); background: var(--clr-surface);
    }
    .wallet-strip-card__nav button {
      background: none; border: 1px solid var(--clr-border); border-radius: 3px;
      width: 22px; height: 22px; cursor: pointer; color: var(--clr-ink-muted);
      font-size: 0.85rem; line-height: 1; margin-left: 4px;
    }
    .wallet-strip-card__nav button:hover { background: var(--clr-surface); }
    .wallet-strip {
      display: flex; gap: var(--sp-sm); overflow-x: auto;
      padding: var(--sp-md); scroll-snap-type: x mandatory;
    }
    .coin-chip {
      flex: 0 0 116px; scroll-snap-align: start;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: var(--sp-sm); border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm); text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .coin-chip:hover { background: var(--clr-surface); border-color: var(--clr-moss); }
    .coin-chip__name { font-size: 0.68rem; font-weight: 600; color: var(--clr-earth); text-align: center; }
    .coin-chip__ebx  { font-family: var(--font-mono); font-size: 0.62rem; color: var(--clr-ink-light); }
    .coin-chip--empty {
      flex: 1 1 auto; border-style: dashed; cursor: default;
      font-size: 0.72rem; color: var(--clr-ink-light); text-align: center; line-height: 1.6;
    }

    /* Annulus 3 (center) */
    .annulus3-card {
      background: #0f1a14; border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-lg); padding: var(--sp-xl);
      display: flex; flex-direction: column; align-items: center; gap: var(--sp-md);
    }
    .annulus3-svg { width: 100%; max-width: 360px; height: auto; }
    .annulus3-toggle { display: flex; gap: 4px; }
    .annulus3-toggle button {
      padding: 4px 14px; font-family: var(--font-mono); font-size: 0.62rem;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 3px;
      background: none; color: rgba(245,240,232,0.45);
    }
    .annulus3-toggle button.active {
      background: rgba(232,168,76,0.12); color: var(--clr-honey); border-color: var(--clr-honey);
    }
    .annulus3-caption {
      font-size: 0.72rem; color: rgba(245,240,232,0.3);
      text-align: center; line-height: 1.6; max-width: 300px;
    }

    /* Right rail: gear (b), badge (a), org mode (c) */
    .pf-right { display: flex; flex-direction: column; gap: var(--sp-lg); }
    .pf-right-row { display: flex; gap: var(--sp-sm); align-items: flex-start; }
    .pf-gear {
      width: 36px; height: 36px; flex-shrink: 0; cursor: pointer;
      background: white; border: 1px solid var(--clr-border); border-radius: var(--radius-sm);
      font-size: 1rem; color: var(--clr-ink-muted); transition: background 0.15s;
    }
    .pf-gear:hover { background: var(--clr-surface); }
    .pf-badge-card {
      flex: 1; background: var(--clr-forest); border-radius: var(--radius-md);
      padding: var(--sp-lg); text-align: center; color: var(--clr-parchment);
    }
    .pf-badge-card__ring { display: flex; justify-content: center; margin-bottom: var(--sp-sm); }
    .pf-badge-card__handle {
      font-family: var(--font-mono); font-size: 0.8rem; margin-bottom: 2px;
    }
    .pf-orgmode {
      width: 100%; padding: 10px 12px; cursor: pointer;
      background: white; border: 1px solid var(--clr-border); border-radius: var(--radius-sm);
      font-size: 0.78rem; font-weight: 600; color: var(--clr-earth);
      display: flex; flex-direction: column; gap: 2px; align-items: center;
      transition: border-color 0.15s;
    }
    .pf-orgmode:hover:not(:disabled) { border-color: var(--clr-moss); }
    .pf-orgmode:disabled { cursor: not-allowed; opacity: 0.55; }
    .pf-orgmode__lock {
      font-family: var(--font-mono); font-size: 0.6rem; font-weight: 400;
      color: var(--clr-ink-light);
    }

  </style>
</head>
<body>
  <a href="index.html" class="ebx-home-mark">EBX</a>

  <!-- JS decides whether to show onboarding or profile -->
  <div id="app-root"></div>

  <div id="ebx-footer-mount"></div>

  <script src="resources/js/ebx_shared.js"></script>
  <script>
  (async function () {

    await EBX.loadAll();
    const causes = EBX.config.causes;

    // Shared nav: home mark + user badge on every page
    await EBX.initPage();

    /* ═══════════════════════════════════════════
       AUTH GATE — check real API session first
       ═════════════════════════════════════════= */

    // If a JWT token exists, validate it with the API
    let apiUser = null;
    if (EBX.Auth.isLoggedIn()) {
      apiUser = await EBX.Auth.fetchMe();
      // fetchMe clears the token if invalid; apiUser===null means expired
    }

    if (apiUser) {
      /* ── Logged-in: merge API identity with any localStorage extras ── */
      let extras = {};
      try { extras = JSON.parse(localStorage.getItem('ebx_profile') || '{}'); } catch(e) {}
      const profile = {
        handle:      apiUser.handle,
        email:       apiUser.email,
        joined:      apiUser.created_at,
        ebx_balance: extras.ebx_balance ?? 0,
        credits:     extras.credits     ?? [],
        causes:      extras.causes      ?? [],
        amount:      extras.amount      ?? 20,
        type:        extras.type        ?? 'benefactor',
      };
      renderProfile(profile);
      return;
    }

    /* ── Not logged in: show login/signup gate ── */
    renderAuthGate();
    return;

    /* ═══════════════════════════════════════════
       (unreachable guard — renderOnboarding kept
        for the localStorage-only fallback path
        reached from within renderAuthGate)
       ═════════════════════════════════════════= */


    /* ─────────────────────────────────────────
       AUTH GATE (login + signup tabs, inline)
       ───────────────────────────────────────── */

    function renderAuthGate() {
      const root = document.getElementById('app-root');
      root.style.cssText = 'background:#0f1a14;min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:24px;';

      root.innerHTML = `
        <div style="width:100%;max-width:400px;">
          <div style="text-align:center;margin-bottom:28px;">
            <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;
                        color:var(--clr-parchment);letter-spacing:-0.02em;">Earthbux</div>
            <div style="font-family:var(--font-mono);font-size:0.68rem;letter-spacing:.12em;
                        text-transform:uppercase;color:rgba(245,240,232,0.4);margin-top:6px;">
              Your profile
            </div>
          </div>
          <div style="background:rgba(22,34,24,0.98);border:1px solid rgba(255,255,255,0.1);
                      border-radius:14px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.4);">
            <div id="ag-tabs" style="display:grid;grid-template-columns:1fr 1fr;
                        border-bottom:1px solid rgba(255,255,255,0.07);">
              <button id="ag-tab-login" onclick="agShowTab('login')"
                style="padding:14px;background:rgba(232,168,76,0.06);border:none;cursor:pointer;
                       border-bottom:2px solid var(--clr-honey);
                       font-family:var(--font-mono);font-size:.72rem;font-weight:600;
                       letter-spacing:.08em;text-transform:uppercase;color:var(--clr-honey);">Log In</button>
              <button id="ag-tab-signup" onclick="agShowTab('signup')"
                style="padding:14px;background:none;border:none;cursor:pointer;
                       border-bottom:2px solid transparent;
                       font-family:var(--font-mono);font-size:.72rem;font-weight:600;
                       letter-spacing:.08em;text-transform:uppercase;color:rgba(245,240,232,0.4);">Sign Up</button>
            </div>
            <div id="ag-panel-login" style="padding:24px;">
              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:.76rem;font-weight:600;color:rgba(245,240,232,0.6);margin-bottom:6px;">Email or handle</label>
                <input id="ag-lg-user" type="text" autocomplete="username" placeholder="you@example.com or @handle"
                  style="width:100%;box-sizing:border-box;padding:10px 13px;background:rgba(255,255,255,0.05);
                         border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--clr-parchment);font-size:.9rem;outline:none;" />
              </div>
              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:.76rem;font-weight:600;color:rgba(245,240,232,0.6);margin-bottom:6px;">Password</label>
                <input id="ag-lg-pass" type="password" autocomplete="current-password" placeholder="••••••••"
                  style="width:100%;box-sizing:border-box;padding:10px 13px;background:rgba(255,255,255,0.05);
                         border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--clr-parchment);font-size:.9rem;outline:none;" />
              </div>
              <button onclick="agDoLogin()"
                style="width:100%;padding:11px;background:var(--clr-amber);border:none;border-radius:8px;cursor:pointer;
                       font-family:var(--font-mono);font-size:.78rem;font-weight:700;letter-spacing:.06em;color:#0f1a14;">
                Log In →
              </button>
              <div id="ag-lg-msg" style="font-size:.76rem;margin-top:10px;text-align:center;min-height:18px;"></div>
            </div>
            <div id="ag-panel-signup" style="padding:24px;display:none;">
              <div style="margin-bottom:14px;">
                <label style="display:block;font-size:.76rem;font-weight:600;color:rgba(245,240,232,0.6);margin-bottom:6px;">Email</label>
                <input id="ag-su-email" type="email" autocomplete="email" placeholder="you@example.com"
                  style="width:100%;box-sizing:border-box;padding:10px 13px;background:rgba(255,255,255,0.05);
                         border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--clr-parchment);font-size:.9rem;outline:none;" />
              </div>
              <div style="margin-bottom:14px;">
                <label style="display:block;font-size:.76rem;font-weight:600;color:rgba(245,240,232,0.6);margin-bottom:6px;">
                  Handle <span style="font-weight:400;opacity:.5;font-size:.72rem;">(public · no spaces)</span>
                </label>
                <input id="ag-su-handle" type="text" autocomplete="username" placeholder="terra_watcher"
                  style="width:100%;box-sizing:border-box;padding:10px 13px;background:rgba(255,255,255,0.05);
                         border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--clr-parchment);font-size:.9rem;outline:none;" />
              </div>
              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:.76rem;font-weight:600;color:rgba(245,240,232,0.6);margin-bottom:6px;">
                  Password <span style="font-weight:400;opacity:.5;font-size:.72rem;">(8+ chars)</span>
                </label>
                <input id="ag-su-pass" type="password" autocomplete="new-password" placeholder="••••••••"
                  style="width:100%;box-sizing:border-box;padding:10px 13px;background:rgba(255,255,255,0.05);
                         border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--clr-parchment);font-size:.9rem;outline:none;" />
              </div>
              <button onclick="agDoSignup()"
                style="width:100%;padding:11px;background:var(--clr-amber);border:none;border-radius:8px;cursor:pointer;
                       font-family:var(--font-mono);font-size:.78rem;font-weight:700;letter-spacing:.06em;color:#0f1a14;">
                Create Account →
              </button>
              <div id="ag-su-msg" style="font-size:.76rem;margin-top:10px;text-align:center;min-height:18px;"></div>
            </div>
          </div>
          <p style="text-align:center;font-size:.72rem;color:rgba(245,240,232,0.25);margin-top:20px;line-height:1.65;">
            Your handle is your public identity. Email and password are stored securely and never shared.
          </p>
        </div>`;

      window.agShowTab = function(tab) {
        const isL = tab === 'login';
        document.getElementById('ag-panel-login').style.display  = isL ? 'block' : 'none';
        document.getElementById('ag-panel-signup').style.display = isL ? 'none'  : 'block';
        const tl = document.getElementById('ag-tab-login');
        const ts = document.getElementById('ag-tab-signup');
        tl.style.color = isL ? 'var(--clr-honey)' : 'rgba(245,240,232,0.4)';
        tl.style.background = isL ? 'rgba(232,168,76,0.06)' : 'none';
        tl.style.borderBottomColor = isL ? 'var(--clr-honey)' : 'transparent';
        ts.style.color = isL ? 'rgba(245,240,232,0.4)' : 'var(--clr-honey)';
        ts.style.background = isL ? 'none' : 'rgba(232,168,76,0.06)';
        ts.style.borderBottomColor = isL ? 'transparent' : 'var(--clr-honey)';
      };
      window.agDoLogin = async function() {
        const user = document.getElementById('ag-lg-user').value.trim();
        const pass = document.getElementById('ag-lg-pass').value;
        const msg  = document.getElementById('ag-lg-msg');
        if (!user || !pass) { msg.style.color='#f87171'; msg.textContent='Please fill in all fields.'; return; }
        msg.style.color='rgba(245,240,232,0.5)'; msg.textContent='Logging in…';
        const ok = await EBX.Auth.login(user, pass);
        if (ok) { msg.style.color='#34d399'; msg.textContent='✓ Logged in!'; setTimeout(() => location.reload(), 600); }
        else    { msg.style.color='#f87171'; msg.textContent='Invalid credentials. Try again.'; }
      };
      window.agDoSignup = async function() {
        const email  = document.getElementById('ag-su-email').value.trim();
        const handle = document.getElementById('ag-su-handle').value.trim();
        const pass   = document.getElementById('ag-su-pass').value;
        const msg    = document.getElementById('ag-su-msg');
        if (!email || !handle || !pass) { msg.style.color='#f87171'; msg.textContent='Please fill in all fields.'; return; }
        if (pass.length < 8)  { msg.style.color='#f87171'; msg.textContent='Password must be 8+ characters.'; return; }
        if (/\s/.test(handle)) { msg.style.color='#f87171'; msg.textContent='Handle cannot contain spaces.'; return; }
        msg.style.color='rgba(245,240,232,0.5)'; msg.textContent='Creating account…';
        const created = await EBX.Auth.signup(email, handle, pass);
        if (!created) { msg.style.color='#f87171'; msg.textContent=EBX.Auth.lastSignupError||'Signup failed.'; return; }
        msg.textContent='Signing you in…';
        const ok = await EBX.Auth.login(handle, pass);
        if (ok) { msg.style.color='#34d399'; msg.textContent='✓ Account created!'; setTimeout(() => location.reload(), 600); }
        else    { msg.style.color='#34d399'; msg.textContent='✓ Created — please log in.'; setTimeout(() => agShowTab('login'), 1000); }
      };
      ['ag-lg-user','ag-lg-pass'].forEach(id => document.getElementById(id)?.addEventListener('keydown', e => { if (e.key==='Enter') agDoLogin(); }));
      ['ag-su-email','ag-su-handle','ag-su-pass'].forEach(id => document.getElementById(id)?.addEventListener('keydown', e => { if (e.key==='Enter') agDoSignup(); }));
      document.getElementById('ag-lg-user')?.focus();
    }

    /* ─────────────────────────────────────────
       ONBOARDING (localStorage-only fallback)
       ───────────────────────────────────────── */

    function renderOnboarding() {
      const root = document.getElementById('app-root');
      root.innerHTML = `<div class="onboarding" id="ob-wrap"></div>`;

      const steps = [
        { id: 'type',     title: 'Who are you?',           subtitle: 'Tell us how you\'ll be using Earthbux. You can always change this later.' },
        { id: 'identity', title: 'Set up your identity',   subtitle: 'This is how the community will know you. Your real name is never required.' },
        { id: 'causes',   title: 'What do you care about?', subtitle: 'Select the causes you want to follow. This shapes your feed and credit portfolio.' },
        { id: 'donation', title: 'Make your first donation', subtitle: 'Every two weeks a new pool forms. Your first donation mints your first earthbucks and creates your credit.' },
        { id: 'confirm',  title: 'You\'re in.',             subtitle: 'Your profile is ready. Your earthbucks will be minted on the next pool date.' },
      ];

      let currentStep = 0;
      const formData  = { type: 'benefactor', handle: '', display: '', causes: [], amount: 20 };

      function saveAndAdvance() {
        if (currentStep < steps.length - 1) {
          currentStep++;
          drawStep();
        } else {
          // Save profile
          profile = {
            type:        formData.type,
            handle:      formData.handle || 'anon_' + Math.floor(Math.random() * 9999),
            display:     formData.display || 'Anonymous',
            causes:      formData.causes,
            amount:      formData.amount,
            joined:      new Date().toISOString(),
            ebx_balance: 0,
            credits:     [],
          };
          try { localStorage.setItem('ebx_profile', JSON.stringify(profile)); } catch(e) {}
          renderProfile(profile);
        }
      }

      function drawStep() {
        const step     = steps[currentStep];
        const pct      = ((currentStep + 1) / steps.length) * 100;
        const dotsHTML = steps.map((_,i) =>
          `<div class="step-dot ${i < currentStep ? 'done' : i === currentStep ? 'active' : ''}"></div>`
        ).join('');

        document.getElementById('ob-wrap').innerHTML = `
          <div class="onboarding__card">
            <div class="onboarding__progress">
              <div class="onboarding__progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="onboarding__body">
              <div class="onboarding__step-label">Step ${currentStep + 1} of ${steps.length}</div>
              <h2 class="onboarding__title">${step.title}</h2>
              <p class="onboarding__subtitle">${step.subtitle}</p>
              <div id="ob-step-content"></div>
              <div class="onboarding__actions">
                <button class="ob-back" id="ob-back-btn"
                  ${currentStep === 0 ? 'style="visibility:hidden"' : ''}>← Back</button>
                <div class="step-dots">${dotsHTML}</div>
                <button class="btn btn-primary" id="ob-next-btn">
                  ${currentStep === steps.length - 1 ? 'Go to my profile' : 'Continue →'}
                </button>
              </div>
            </div>
          </div>`;

        // Render step content
        const content = document.getElementById('ob-step-content');

        if (step.id === 'type') {
          content.innerHTML = `
            <div class="type-choice">
              <button class="type-card ${formData.type==='benefactor'?'selected':''}"
                      data-type="benefactor" onclick="pickType(this)">
                <div class="type-card__icon">🌱</div>
                <div class="type-card__title">Benefactor</div>
                <div class="type-card__desc">I donate and want to guide how the money is used. I vote on initiatives and orgs.</div>
              </button>
              <button class="type-card ${formData.type==='org'?'selected':''}"
                      data-type="org" onclick="pickType(this)">
                <div class="type-card__icon">🏛️</div>
                <div class="type-card__title">Organization</div>
                <div class="type-card__desc">We bid on initiatives and carry out funded missions. We report progress to unlock payment.</div>
              </button>
            </div>`;

        } else if (step.id === 'identity') {
          content.innerHTML = `
            <div class="ob-input-row">
              <div class="ob-field">
                <label class="ob-label">Handle <span>(public, unique)</span></label>
                <input class="ob-input" id="ob-handle" type="text"
                  placeholder="e.g. terra_watcher"
                  value="${formData.handle}"
                  oninput="formData.handle=this.value" />
              </div>
              <div class="ob-field">
                <label class="ob-label">Display name <span>(optional)</span></label>
                <input class="ob-input" id="ob-display" type="text"
                  placeholder="e.g. Maya R."
                  value="${formData.display}"
                  oninput="formData.display=this.value" />
              </div>
            </div>
            <div class="ob-field">
              <label class="ob-label">Email <span>(private, for notifications)</span></label>
              <input class="ob-input" id="ob-email" type="email"
                placeholder="you@example.com" />
            </div>
            <p style="font-size:0.75rem;color:rgba(245,240,232,0.3);margin-top:var(--sp-sm);line-height:1.6;">
              Your handle is the only thing other users see. Your email is never shared. No password required yet — full auth is coming soon.
            </p>`;

        } else if (step.id === 'causes') {
          content.innerHTML = `
            <div class="cause-picker" id="cause-picker">
              ${causes.map(c => `
                <label class="cause-pick ${formData.causes.includes(c.index)?'selected':''}"
                       style="--pick-color:${c.color}"
                       onclick="toggleCause(${c.index},this)">
                  <input type="checkbox" ${formData.causes.includes(c.index)?'checked':''} />
                  <div class="cause-pick__dot" style="background:${c.color}"></div>
                  <span class="cause-pick__name">${c.name}</span>
                </label>`).join('')}
            </div>
            <p style="font-size:0.75rem;color:rgba(245,240,232,0.3);margin-top:var(--sp-md);line-height:1.6;">
              You can follow all causes or just a few. Causes you select appear first in your feed and your credit badges will reflect them.
            </p>`;

        } else if (step.id === 'donation') {
          const amounts = [10, 20, 50, 100];
          content.innerHTML = `
            <div class="amount-grid">
              ${amounts.map(a => `
                <button class="amount-tile ${formData.amount===a?'selected':''}"
                        onclick="pickAmount(${a},this)">
                  $${a}
                  <span class="amount-tile__sub">/ cycle</span>
                </button>`).join('')}
            </div>
            <div class="ob-field">
              <label class="ob-label">Or enter a custom amount</label>
              <input class="ob-input" type="number" min="1" placeholder="$"
                oninput="formData.amount=parseFloat(this.value)||formData.amount" />
            </div>
            <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
                        border-radius:var(--radius-sm);padding:var(--sp-md);margin-top:var(--sp-md);">
              <div style="font-size:0.75rem;color:rgba(245,240,232,0.5);line-height:1.8;">
                <div>🌱 <strong style="color:rgba(245,240,232,0.85);">5/16</strong> goes to Earthbux operations</div>
                <div>💸 <strong style="color:rgba(245,240,232,0.85);">1/16</strong> to the winning org, immediately in cash</div>
                <div>🔓 <strong style="color:rgba(245,240,232,0.85);">3/8</strong> becomes your earthbucks, released over 12 weeks</div>
                <div>📅 <strong style="color:rgba(245,240,232,0.85);">1/4</strong> released to the org weekly, contingent on reporting</div>
              </div>
            </div>`;

        } else if (step.id === 'confirm') {
          const causeNames = formData.causes
            .map(ci => causes.find(c=>c.index===ci)?.name)
            .filter(Boolean).join(', ') || 'All causes';
          const nextPool = getNextPoolDate();
          content.innerHTML = `
            <div style="display:flex;flex-direction:column;gap:var(--sp-md);">
              <div style="background:rgba(255,255,255,0.04);border-radius:var(--radius-sm);padding:var(--sp-lg);">
                <div style="font-size:0.72rem;font-family:var(--font-mono);letter-spacing:.08em;text-transform:uppercase;
                            color:rgba(245,240,232,0.35);margin-bottom:var(--sp-sm);">Your profile</div>
                <div style="font-size:0.9rem;color:rgba(245,240,232,0.85);margin-bottom:4px;">
                  <strong>@${formData.handle || 'anon'}</strong>${formData.display ? ` · ${formData.display}` : ''}
                </div>
                <div style="font-size:0.78rem;color:rgba(245,240,232,0.45);">
                  ${formData.type === 'org' ? 'Organization' : 'Benefactor'} · Following: ${causeNames}
                </div>
              </div>
              <div style="background:rgba(201,124,42,0.1);border:1px solid rgba(201,124,42,0.25);
                          border-radius:var(--radius-sm);padding:var(--sp-lg);">
                <div style="font-size:0.72rem;font-family:var(--font-mono);letter-spacing:.08em;text-transform:uppercase;
                            color:var(--clr-honey);opacity:.7;margin-bottom:var(--sp-sm);">First donation</div>
                <div style="font-family:var(--font-display);font-size:1.8rem;font-weight:900;color:var(--clr-honey);">
                  $${formData.amount}
                </div>
                <div style="font-size:0.78rem;color:rgba(245,240,232,0.4);margin-top:4px;">
                  Minted on next pool date: ${nextPool}
                </div>
              </div>
              <p style="font-size:0.78rem;color:rgba(245,240,232,0.35);line-height:1.65;margin:0;">
                Your earthbucks and credit will appear in your wallet after the pool closes.
                You can adjust your donation amount or causes at any time from your profile.
              </p>
            </div>`;
        }

        // Wire buttons
        document.getElementById('ob-next-btn').addEventListener('click', saveAndAdvance);
        const back = document.getElementById('ob-back-btn');
        if (back) back.addEventListener('click', () => {
          if (currentStep > 0) { currentStep--; drawStep(); }
        });
      }

      // Expose helpers to inline handlers
      window.formData   = formData;
      window.pickType   = (el) => {
        formData.type = el.dataset.type;
        document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
      };
      window.toggleCause = (idx, el) => {
        if (formData.causes.includes(idx)) {
          formData.causes = formData.causes.filter(c => c !== idx);
          el.classList.remove('selected');
        } else {
          formData.causes.push(idx);
          el.classList.add('selected');
        }
      };
      window.pickAmount = (a, el) => {
        formData.amount = a;
        document.querySelectorAll('.amount-tile').forEach(t => t.classList.remove('selected'));
        el.classList.add('selected');
      };

      drawStep();
    }


    /* ─────────────────────────────────────────
       PROFILE VIEW — pass 34 overhaul (build-seq 1)
       Layout per STRUCTURE.md Benefactor-Profile drawing:
         left   = CreditCoin Wallet (top) + Choices table
         center = Annulus 3, front/back toggle (empty for now)
         right  = (b) settings gear · (a) credit badge · (c) org-mode switch
       Upcoming-decisions banner removed (drawing has no banner; also a
       BACKLOG item). Settings modal kept; open/close helpers now defined
       (they were referenced but missing — gear was dead before this pass).
       ───────────────────────────────────────── */

    function renderProfile(p) {
      document.title = `Earthbux — @${p.handle}`;
      const root = document.getElementById('app-root');
      // build-seq 5 (pass 35): org mode stays ON profile.html — the page
      // re-renders its org face (Initiative Coins / Tasklist / Annulus 4)
      // instead of navigating away. The two faces resemble each other.
      window._lastProfileData = p;
      const orgMode = window._profileMode === 'org';

      const initials = (p.display || p.handle || '?')
        .split(' ').map(w => w[0]?.toUpperCase()).slice(0,2).join('');

      const _ls = k => { try { return JSON.parse(localStorage.getItem(k) || '{}'); } catch(e) { return {}; } };
      const tivShares  = _ls('ebx_vote_shares');     // { causeId: { initId: share } }
      const tivCommits = _ls('ebx_vote_committed');  // { causeId: { shares, at, ebx } }
      const orgVotes   = _ls('ebx_org_votes');       // { causeId: {org_id, tiv_id, votes} } (pass 35; was plain orgId)
      const orgCommits = _ls('ebx_org_committed');   // { causeId: { at, ebx } }
      const inits = EBX.config.initiatives   || [];
      const orgs  = EBX.config.organizations || [];
      const initById = {}; inits.forEach(i => { initById[String(i.id)] = i; });
      const orgById  = {}; orgs.forEach(o => { orgById[String(o.id)]  = o; });

      /* ── CreditCoin Wallet — one coin per mission contributed to ── */
      const coins = causes.map(c => {
        const ebx = ((tivCommits[c.id] && tivCommits[c.id].ebx) || 0)
                  + ((orgCommits[c.id] && orgCommits[c.id].ebx) || 0);
        return ebx > 0 ? { cause: c, ebx } : null;
      }).filter(Boolean);

      const walletHTML = coins.length
        ? coins.map(coin => `
            <a class="coin-chip" href="cause.html?id=${coin.cause.id}" title="${coin.cause.name} mission">
              ${EBX.creditBadge([{ causeIndex: coin.cause.index, amount: coin.ebx }], 40)}
              <div class="coin-chip__name">${coin.cause.name}</div>
              <div class="coin-chip__ebx">${EBX.formatEBX(coin.ebx)}</div>
            </a>`).join('')
        : `<div class="coin-chip coin-chip--empty">No credit coins yet.<br/>Commit EBX to a mission to mint your first.</div>`;

      /* ── Choices table — one row per cause; multi-tiv splits show top share only ── */
      const choiceRows = causes.map(c => {
        const shares = tivShares[c.id] || {};
        let topId = null, topShare = 0;
        Object.keys(shares).forEach(id => {
          const s = Number(shares[id]) || 0;
          if (s > topShare) { topShare = s; topId = id; }
        });
        const tiv   = topId != null ? (initById[String(topId)] || null) : null;
        // build-seq 4/5 (pass 35): ebx_org_votes now stores objects
        // ({org_id, tiv_id, votes}); accept both shapes.
        const _ov = orgVotes[c.id];
        const orgId = _ov && typeof _ov === 'object' ? _ov.org_id : _ov;
        const org   = orgId != null ? (orgById[String(orgId)] || null) : null;
        return {
          cause: c, topShare,
          tivLabel: tiv ? tiv.title : (topId != null ? 'Initiative #' + topId : null),
          orgLabel: org ? org.name  : (orgId != null ? 'Org #' + orgId : null),
        };
      });

      const choiceRowHTML = (row, kind) => {
        const label = kind === 'org' ? row.orgLabel : row.tivLabel;
        const split = kind === 'tiv' && label && row.topShare > 0 && row.topShare < 1
          ? ` <span style="font-family:var(--font-mono);font-size:0.62rem;color:var(--clr-ink-light);">${Math.round(row.topShare * 100)}%</span>`
          : '';
        return `
          <tr>
            <td style="width:36px;">
              <span class="cause-dot" style="background:${row.cause.color};display:inline-block;"></span>
            </td>
            <td>
              <div style="font-size:0.72rem;color:var(--clr-ink-light);">${row.cause.name}</div>
              ${label
                ? `<a class="choice-link" href="cause.html?id=${row.cause.id}">${label}</a>${split}`
                : `<span class="no-choice">${kind === 'org' ? 'No org vote yet' : 'No vote yet'}</span>`}
            </td>
          </tr>`;
      };

      /* ── (a) credit badge holdings · (c) org-mode gate ── */
      const holdings = coins.map(c => ({ causeIndex: c.cause.index, amount: c.ebx }));
      const hasCoin  = coins.length > 0;

      /* ── posts history (kept below the drawing's fold) ── */
      const allPosts  = EBX.config.feed || [];
      const userPosts = allPosts
        .filter(post => post.author === p.handle || post.author === `@${p.handle}`)
        .sort((a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime());
      const feedHistoryHTML = userPosts.length
        ? userPosts.map(post => `
            <div class="activity-item">
              <div class="activity-item__icon" style="font-size:0.75rem;background:var(--clr-surface);">💬</div>
              <div class="activity-item__body">
                ${post.title ? `<div style="font-size:0.82rem;font-weight:600;color:var(--clr-ink);margin-bottom:2px;">${post.title}</div>` : ''}
                <div class="activity-item__text">${(post.body || '').slice(0, 120)}${post.body?.length > 120 ? '…' : ''}</div>
                <div class="activity-item__time">${EBX.timeAgo(post.created_at)}</div>
              </div>
            </div>`).join('')
        : `<div style="color:var(--clr-ink-light);font-size:0.82rem;padding:var(--sp-lg) 0;">
             No posts yet. <a href="en.html" style="color:var(--clr-moss);">Join the discussion →</a>
           </div>`;

      /* ── build-seq 5 (pass 35): org-mode face content ── */
      let initiativeCoinsHTML = '', tasklistCardHTML = '';
      if (orgMode) {
        // Initiative Coins — every initiative this account has registered an
        // org for (local ebx_org_regs) or voted-as-org on (tiv_id), proxy
        // until real OrgAccount membership rows exist.
        let _regs = [];
        try { _regs = JSON.parse(localStorage.getItem('ebx_org_regs') || '[]'); } catch (e) { _regs = []; }
        const _tivIds = new Set();
        (Array.isArray(_regs) ? _regs : []).forEach(r =>
          (r && r.initiative_ids || []).forEach(id => _tivIds.add(String(id))));
        Object.values(orgVotes || {}).forEach(v => {
          if (v && v.tiv_id) _tivIds.add(String(v.tiv_id));
        });
        const _regTivs = [..._tivIds].map(id => initById[id]).filter(Boolean);
        initiativeCoinsHTML = _regTivs.length
          ? _regTivs.map(i => {
              const c = causes.find(x => x.index === i.cause_index || x.id === i.cause_id);
              return `<a class="coin-chip" href="cause.html?id=${c ? c.id : ''}" title="${i.title}">
                ${EBX.creditBadge(c ? [{ causeIndex: c.index, amount: i.ebx_committed || 0 }] : [], 40)}
                <div class="coin-chip__name">${i.emoji || '🌱'} ${i.title}</div>
                <div class="coin-chip__ebx">${EBX.formatEBX(i.ebx_committed || 0)}</div>
              </a>`;
            }).join('')
          : `<div class="coin-chip coin-chip--empty">No initiative coins yet.<br/>Register your organization for a mission to mint one.</div>`;
        let _done = {};
        try { _done = JSON.parse(localStorage.getItem('ebx_org_tasks') || '{}'); } catch (e) { _done = {}; }
        const _tasks = [
          'Build your mission page',
          'Submit a budget (phase 3)',
          'Post a progress update',
          'Respond to benefactor questions',
          'Confirm beneficiary outreach',
        ];
        tasklistCardHTML = `
                <div class="choices-col-card">
                  <div class="choices-col-header">
                    <div class="choices-col-title">Tasklist</div>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;">
                    ${_tasks.map((t, i) => `
                      <label style="display:flex;align-items:center;gap:8px;font-size:0.8rem;cursor:pointer;
                                    ${_done[i] ? 'opacity:0.5;text-decoration:line-through;' : ''}">
                        <input type="checkbox" ${_done[i] ? 'checked' : ''} onchange="toggleOrgTask(${i})" />
                        ${t}
                      </label>`).join('')}
                  </div>
                </div>`;
      }

      root.innerHTML = `
        <div style="background:var(--clr-bg);">
          <div class="container">
            <div class="pf-grid">

              <!-- ── Left: CreditCoin Wallet + choices table ── -->
              <aside class="pf-left">
                <div class="wallet-strip-card">
                  <div class="wallet-strip-card__head">
                    <span class="choices-col-title">${orgMode ? 'Initiative Coins' : 'CreditCoin Wallet'}</span>
                    <span class="wallet-strip-card__nav">
                      <button onclick="walletScroll(-1)" aria-label="Scroll wallet left">‹</button>
                      <button onclick="walletScroll(1)" aria-label="Scroll wallet right">›</button>
                    </span>
                  </div>
                  <div class="wallet-strip" id="wallet-strip">${orgMode ? initiativeCoinsHTML : walletHTML}</div>
                </div>

                ${orgMode ? tasklistCardHTML : `<div class="choices-col-card">
                  <div class="choices-col-header">
                    <div class="choices-col-title">Your choices</div>
                    <div class="choices-toggle">
                      <button class="active" id="toggle-inits" onclick="toggleChoicesView('inits')">Initiatives</button>
                      <button id="toggle-orgs" onclick="toggleChoicesView('orgs')">Orgs</button>
                    </div>
                  </div>
                  <table class="choices-table" id="choices-table-inits">
                    <tbody>${choiceRows.map(r => choiceRowHTML(r, 'tiv')).join('')}</tbody>
                  </table>
                  <table class="choices-table" id="choices-table-orgs" style="display:none;">
                    <tbody>${choiceRows.map(r => choiceRowHTML(r, 'org')).join('')}</tbody>
                  </table>
                </div>`}
              </aside>

              <!-- ── Center: Annulus 3 (benefactor-specific; empty for now) ── -->
              <main class="pf-center">
                <div class="annulus3-card">
                  <div class="annulus3-toggle">
                    <button id="a3-front" class="active" onclick="a3Flip('front')">Front</button>
                    <button id="a3-back" onclick="a3Flip('back')">Back</button>
                  </div>
                  <svg viewBox="0 0 320 320" class="annulus3-svg" aria-label="Annulus 3 placeholder">
                    <circle cx="160" cy="160" r="130" fill="none" stroke="rgba(245,240,232,0.12)" stroke-width="26" stroke-dasharray="4 7"/>
                    <circle cx="160" cy="160" r="92"  fill="none" stroke="rgba(245,240,232,0.07)" stroke-width="18" stroke-dasharray="3 8"/>
                    <text x="160" y="152" text-anchor="middle" fill="rgba(245,240,232,0.55)"
                          style="font-family:var(--font-display);font-size:17px;font-weight:700;">Annulus ${orgMode ? 4 : 3}</text>
                    <text id="a3-face-label" x="160" y="176" text-anchor="middle" fill="rgba(245,240,232,0.3)"
                          style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;">FRONT · COMING SOON</text>
                  </svg>
                  <div class="annulus3-caption">${orgMode
                    ? 'The organization ring — fills as your missions progress. Almost identical to Annulus 3.'
                    : 'Your personal ring — fills as you vote and commit across the seven causes.'}</div>
                </div>
              </main>

              <!-- ── Right: (b) settings · (a) credit badge · (c) org mode ── -->
              <aside class="pf-right">
                <div class="pf-right-row">
                  <button class="pf-gear" onclick="openSettingsModal()" title="Settings" aria-label="Open settings">⚙</button>
                  <div class="pf-badge-card">
                    <div class="pf-badge-card__ring">
                      ${hasCoin
                        ? EBX.creditBadge(holdings, 56)
                        : `<div class="profile-card__avatar" style="width:56px;height:56px;margin:0 auto;font-size:1.1rem;">${initials}</div>`}
                    </div>
                    <div class="pf-badge-card__handle">@${p.handle}</div>
                    <div class="profile-card__type">${orgMode ? 'Organization mode' : (p.type === 'org' ? 'Organization' : 'Benefactor')}</div>
                  </div>
                </div>
                ${orgMode
                  ? `<button class="pf-orgmode" onclick="switchProfileMode('benefactor')">
                       Switch to Benefactor mode
                     </button>`
                  : `<button class="pf-orgmode" ${hasCoin ? '' : 'disabled'}
                        title="${hasCoin ? 'Open organization mode' : 'Hold a credit coin to unlock org mode for that mission'}"
                        ${hasCoin ? `onclick="switchProfileMode('org')"` : ''}>
                  Switch to Organization mode
                  ${hasCoin ? '' : '<span class="pf-orgmode__lock">🔒 needs a credit coin</span>'}
                </button>`}
              </aside>

            </div>

            <div class="profile-feed-history" style="max-width:760px;margin:0 auto var(--sp-2xl);">
              <div class="profile-feed-eyebrow">Your posts</div>
              <div style="background:white;border:1px solid var(--clr-border);border-radius:var(--radius-md);padding:var(--sp-lg);">
                ${feedHistoryHTML}
              </div>
            </div>
          </div>

          <!-- ── Settings window (modal, opened from the gear) ── -->
          <div id="settings-modal-bg" onclick="closeSettingsOnBg(event)"
               style="display:none;position:fixed;inset:0;z-index:60;background:rgba(20,26,22,0.45);
                      align-items:center;justify-content:center;padding:24px;">
            <div style="background:var(--clr-paper,#fdfbf6);border:1px solid var(--clr-border,#ddd);
                        border-radius:var(--radius-md,10px);max-width:480px;width:100%;
                        max-height:85vh;overflow:auto;padding:var(--sp-xl,24px);box-shadow:0 18px 50px rgba(0,0,0,0.25);">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-md,12px);">
                <div class="profile-feed-eyebrow" style="margin:0;">Settings</div>
                <button onclick="closeSettingsModal()" aria-label="Close settings"
                        style="background:none;border:none;cursor:pointer;font-size:1rem;opacity:0.6;">✕</button>
              </div>
              <div class="settings-group">
                <div class="settings-group__title">Identity</div>
                <div class="settings-row">
                  <div><div class="settings-row__label">Handle</div><div class="settings-row__sub">@${p.handle}</div></div>
                </div>
                <div class="settings-row">
                  <div><div class="settings-row__label">Email</div><div class="settings-row__sub">${p.email || '—'}</div></div>
                </div>
                <div class="settings-row">
                  <div><div class="settings-row__label">Donation per cycle</div><div class="settings-row__sub">$${p.amount || 0} / 14 days</div></div>
                  <button class="btn btn-ghost btn-sm">Change</button>
                </div>
              </div>
              <div style="padding-top:var(--sp-md);display:flex;gap:var(--sp-sm);">
                <button class="btn btn-ghost btn-sm" style="color:var(--clr-ink-light);font-size:0.7rem;"
                  onclick="if(confirm('Clear local data?')){localStorage.removeItem('ebx_profile');localStorage.removeItem('ebx_choices');location.reload();}">
                  Reset local data (dev)
                </button>
              </div>
            </div>
          </div>
        </div>`;

      /* ── window helpers ── */
      // build-seq 5 (pass 35): in-place mode switch — stays on profile.html.
      window.switchProfileMode = function (mode) {
        window._profileMode = mode === 'org' ? 'org' : 'benefactor';
        renderProfile(window._lastProfileData);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      window.toggleOrgTask = function (idx) {
        let done = {};
        try { done = JSON.parse(localStorage.getItem('ebx_org_tasks') || '{}'); } catch (e) { done = {}; }
        done[idx] = !done[idx];
        localStorage.setItem('ebx_org_tasks', JSON.stringify(done));
        renderProfile(window._lastProfileData);
      };
      window.toggleChoicesView = function (view) {
        document.getElementById('choices-table-inits').style.display = view === 'inits' ? '' : 'none';
        document.getElementById('choices-table-orgs').style.display  = view === 'orgs'  ? '' : 'none';
        document.getElementById('toggle-inits').classList.toggle('active', view === 'inits');
        document.getElementById('toggle-orgs').classList.toggle('active',  view === 'orgs');
      };
      window.walletScroll = function (dir) {
        const strip = document.getElementById('wallet-strip');
        if (strip) strip.scrollBy({ left: dir * 132, behavior: 'smooth' });
      };
      window.a3Flip = function (face) {
        const lbl = document.getElementById('a3-face-label');
        if (lbl) lbl.textContent = (face === 'back' ? 'BACK' : 'FRONT') + ' · COMING SOON';
        document.getElementById('a3-front').classList.toggle('active', face === 'front');
        document.getElementById('a3-back').classList.toggle('active',  face === 'back');
      };
      window.openSettingsModal = function () {
        const bg = document.getElementById('settings-modal-bg');
        if (bg) bg.style.display = 'flex';
      };
      window.closeSettingsModal = function () {
        const bg = document.getElementById('settings-modal-bg');
        if (bg) bg.style.display = 'none';
      };
      window.closeSettingsOnBg = function (e) {
        if (e.target && e.target.id === 'settings-modal-bg') window.closeSettingsModal();
      };
    }


    function getNextPoolDate() {
      const cycleState = EBX.Cycle.now();
      const idx = cycleState.activeCauseIndex;
      const winStart = EBX.Cycle.windowStart(idx, cycleState.cycleNum);
      const winEnd = new Date(winStart.getTime() + (EBX.config.causeLengthDays || 14) * EBX.Cycle.MS_PER_DAY);
      return winEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    EBX.initFooter && EBX.initFooter();

  })();
  </script>
</body>
</html>
