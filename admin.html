<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Earthbux · Data Console</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a212b; --panel2: #131a22; --line: #2a3441;
    --txt: #e6edf3; --dim: #8b98a8; --accent: #6baed6; --accent2: #39d98a;
    --warn: #e67a3c; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--txt);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  a { color: var(--accent); }
  header { display: flex; align-items: center; gap: 14px; padding: 12px 18px;
    border-bottom: 1px solid var(--line); background: var(--panel2); }
  header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; }
  header .sub { color: var(--dim); font-size: 12px; }
  header .spacer { flex: 1; }
  header .who { font-size: 12px; color: var(--dim); }
  button { font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: var(--panel); color: var(--txt); padding: 6px 12px; border-radius: 6px; }
  button.primary { background: var(--accent); color: #06121c; border-color: var(--accent); font-weight: 600; }
  button:hover { border-color: var(--accent); }
  input, select { font: inherit; background: var(--panel2); color: var(--txt);
    border: 1px solid var(--line); border-radius: 6px; padding: 6px 9px; }
  .layout { display: flex; height: calc(100vh - 50px); }
  .side { width: 230px; border-right: 1px solid var(--line); background: var(--panel2);
    overflow-y: auto; padding: 10px 0; flex-shrink: 0; }
  .side .group { padding: 6px 16px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .8px; color: var(--dim); margin-top: 8px; }
  .side .item { padding: 6px 16px 6px 24px; cursor: pointer; font-family: var(--mono);
    font-size: 12.5px; color: var(--txt); border-left: 2px solid transparent; }
  .side .item:hover { background: var(--panel); }
  .side .item.active { background: var(--panel); border-left-color: var(--accent);
    color: var(--accent); }
  .side .item.special { font-family: inherit; color: var(--accent2); }
  main { flex: 1; overflow: auto; padding: 18px 22px; }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .toolbar .title { font-size: 16px; font-weight: 600; margin-right: 8px; }
  .toolbar .count { color: var(--dim); font-size: 12px; margin-left: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--line);
    white-space: nowrap; max-width: 360px; overflow: hidden; text-overflow: ellipsis; }
  th { position: sticky; top: 0; background: var(--panel); color: var(--dim);
    font-weight: 600; cursor: default; }
  tbody tr:hover { background: var(--panel); }
  td.mono, .mono { font-family: var(--mono); }
  .msg { color: var(--dim); padding: 30px; text-align: center; }
  .msg.warn { color: var(--warn); }
  .overlay { position: fixed; inset: 0; background: rgba(8,12,16,.9);
    display: flex; align-items: center; justify-content: center; z-index: 20; }
  .login { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 26px 28px; width: 320px; }
  .login h2 { margin: 0 0 4px; font-size: 16px; }
  .login p { margin: 0 0 16px; color: var(--dim); font-size: 12px; }
  .login label { display: block; font-size: 12px; color: var(--dim); margin: 10px 0 4px; }
  .login input { width: 100%; }
  .login button { width: 100%; margin-top: 18px; }
  .login .err { color: var(--warn); font-size: 12px; margin-top: 10px; min-height: 16px; }
  .pill { font-size: 11px; padding: 1px 7px; border-radius: 10px; border: 1px solid var(--line); }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <h1>Earthbux · Data Console</h1>
  <span class="sub">v2 back-office — read-only over the live database</span>
  <span class="spacer"></span>
  <span class="who" id="who"></span>
  <button id="logout" class="hidden">Sign out</button>
</header>

<div class="layout">
  <nav class="side" id="side">
    <div class="group">Tables</div>
    <div id="entities"></div>
    <div class="group">Views</div>
    <div class="item special" data-view="ledger">Ledger · transactions</div>
    <div class="item special" data-view="mission">Search by mission</div>
  </nav>
  <main id="main">
    <div class="msg">Select a table or view from the left.</div>
  </main>
</div>

<div class="overlay" id="overlay">
  <form class="login" id="loginForm">
    <h2>Employee sign-in</h2>
    <p>The console is restricted to Earthbux employees.</p>
    <label>Email or handle</label>
    <input id="li-user" type="text" autocomplete="username" autofocus />
    <label>Password</label>
    <input id="li-pass" type="password" autocomplete="current-password" />
    <button class="primary" type="submit">Sign in</button>
    <div class="err" id="li-err"></div>
  </form>
</div>

<script>
const TOKEN_KEY = "ebx_admin_token";          // auth token ONLY — never app data
let token = localStorage.getItem(TOKEN_KEY) || "";
let current = null;

const $ = (s) => document.querySelector(s);
const el = (t, c) => { const e = document.createElement(t); if (c) e.className = c; return e; };

function authHeaders(extra = {}) {
  return token ? { ...extra, Authorization: "Bearer " + token } : extra;
}

async function api(path, opts = {}) {
  const r = await fetch(path, { ...opts, headers: authHeaders(opts.headers || {}) });
  if (r.status === 401) { token = ""; localStorage.removeItem(TOKEN_KEY); showLogin(); throw new Error("unauthorized"); }
  if (r.status === 403) throw new Error("This account is not an Earthbux employee.");
  if (!r.ok) throw new Error(path + " → " + r.status);
  return r.json();
}

// ---------- auth ----------
function showLogin() { $("#overlay").classList.remove("hidden"); }
function hideLogin() { $("#overlay").classList.add("hidden"); }

$("#loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  $("#li-err").textContent = "";
  const body = new URLSearchParams({ username: $("#li-user").value.trim(), password: $("#li-pass").value });
  try {
    const r = await fetch("/auth/login", { method: "POST", body });
    if (!r.ok) throw new Error("Invalid credentials");
    const data = await r.json();
    token = data.access_token; localStorage.setItem(TOKEN_KEY, token);
    hideLogin(); await boot();
  } catch (err) { $("#li-err").textContent = err.message; }
});

$("#logout").addEventListener("click", () => {
  token = ""; localStorage.removeItem(TOKEN_KEY);
  $("#who").textContent = ""; $("#logout").classList.add("hidden");
  showLogin();
});

// ---------- boot ----------
async function boot() {
  try {
    const me = await api("/auth/me");
    $("#who").innerHTML = `${me.handle} <span class="pill">${me.role}</span>`;
    $("#logout").classList.remove("hidden");
    const entities = await api("/admin/query/entities");
    const box = $("#entities"); box.innerHTML = "";
    entities.forEach((name) => {
      const d = el("div", "item"); d.textContent = name; d.dataset.entity = name;
      d.onclick = () => selectEntity(name); box.appendChild(d);
    });
  } catch (err) {
    if (err.message === "unauthorized") return;
    $("#main").innerHTML = `<div class="msg warn">${err.message}</div>`;
  }
}

function setActive(predicate) {
  document.querySelectorAll(".side .item").forEach((i) => i.classList.toggle("active", predicate(i)));
}

// ---------- entity browser ----------
function selectEntity(name) {
  current = { kind: "entity", name };
  setActive((i) => i.dataset.entity === name);
  $("#main").innerHTML = `
    <div class="toolbar">
      <span class="title mono">${name}</span>
      <input id="f-col" placeholder="column" size="14" />
      <input id="f-val" placeholder="value" size="16" />
      <input id="f-limit" type="number" value="100" min="1" max="500" style="width:74px" title="limit" />
      <button class="primary" id="f-run">Run</button>
      <span class="count" id="rowcount"></span>
    </div>
    <div id="grid"><div class="msg">Running…</div></div>`;
  $("#f-run").onclick = runEntity;
  [$("#f-col"), $("#f-val")].forEach((i) => i.addEventListener("keydown", (e) => { if (e.key === "Enter") runEntity(); }));
  runEntity();
}

async function runEntity() {
  const name = current.name;
  const col = $("#f-col").value.trim(), val = $("#f-val").value.trim();
  const limit = parseInt($("#f-limit").value) || 100;
  const filters = col && val ? { [col]: val } : null;
  try {
    const rows = await api("/admin/query/run", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ entity: name, filters, limit }),
    });
    renderGrid(rows);
  } catch (err) { $("#grid").innerHTML = `<div class="msg warn">${err.message}</div>`; }
}

// ---------- ledger ----------
function selectLedger() {
  current = { kind: "ledger" };
  setActive((i) => i.dataset.view === "ledger");
  $("#main").innerHTML = `
    <div class="toolbar">
      <span class="title">Ledger · transactions</span>
      <input id="l-mission" placeholder="mission_id" size="14" />
      <select id="l-type"><option value="">all types</option><option value="vote">vote</option><option value="transfer">transfer</option></select>
      <input id="l-bucket" placeholder="bucket" size="12" />
      <input id="l-limit" type="number" value="200" min="1" max="500" style="width:74px" title="limit" />
      <button class="primary" id="l-run">Run</button>
      <span class="count" id="rowcount"></span>
    </div>
    <div id="grid"><div class="msg">Running…</div></div>`;
  $("#l-run").onclick = runLedger;
  runLedger();
}

async function runLedger() {
  const q = new URLSearchParams();
  const m = $("#l-mission").value.trim(), t = $("#l-type").value, b = $("#l-bucket").value.trim();
  if (m) q.set("mission_id", m);
  if (t) q.set("type", t);
  if (b) q.set("bucket", b);
  q.set("limit", $("#l-limit").value || 200);
  try { renderGrid(await api("/transactions?" + q.toString())); }
  catch (err) { $("#grid").innerHTML = `<div class="msg warn">${err.message}</div>`; }
}

// ---------- shared grid renderer ----------
function renderGrid(rows) {
  const count = $("#rowcount"); if (count) count.textContent = rows.length + " rows";
  if (!rows.length) { $("#grid").innerHTML = `<div class="msg">No rows.</div>`; return; }
  const cols = Object.keys(rows[0]);
  const table = el("table");
  const thead = el("thead"), htr = el("tr");
  cols.forEach((c) => { const th = el("th"); th.textContent = c; htr.appendChild(th); });
  thead.appendChild(htr); table.appendChild(thead);
  const tb = el("tbody");
  rows.forEach((row) => {
    const tr = el("tr");
    cols.forEach((c) => {
      const td = el("td"); let v = row[c];
      if (v === null || v === undefined) { td.textContent = "·"; td.style.color = "var(--dim)"; }
      else { v = String(v); td.textContent = v; td.title = v; if (/_id$|^id$/.test(c)) td.className = "mono"; }
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  table.appendChild(tb);
  const g = $("#grid"); g.innerHTML = ""; g.appendChild(table);
}

document.querySelector('[data-view="ledger"]').onclick = selectLedger;

// ---------- search by mission (missions → users → posts/votes/transactions) ----------
// Built entirely on the existing /admin/query/run console: every relevant table
// (votes_p1, votes_p2, posts, transactions) carries mission_id, so we filter by
// it and tab between phases. A vote's LIVE state lives in votes_p1/votes_p2; the
// "transactions" tab is the audit ledger (type='vote' rows = vote mutations,
// type='transfer' rows = EBX moving into a bucket). Optional ben_id narrows to a
// single user.
let _missionList = null;
async function _loadMissions() {
  if (_missionList) return _missionList;
  try {
    _missionList = await api("/admin/query/run", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ entity: "missions", filters: null, limit: 500 }),
    });
  } catch (e) { _missionList = []; }
  return _missionList;
}

async function selectMissionView() {
  current = { kind: "mission", tab: "votes_p1" };
  setActive((i) => i.dataset.view === "mission");
  $("#main").innerHTML = `<div class="msg">Loading missions…</div>`;
  const missions = await _loadMissions();
  const opts = missions.map((m) =>
    `<option value="${m.id}">${m.id}${m.cause_id ? " · " + m.cause_id : ""}${m.current_phase ? " · " + m.current_phase : ""}</option>`
  ).join("");
  $("#main").innerHTML = `
    <div class="toolbar">
      <span class="title">Search by mission</span>
      <select id="m-mission">${opts || '<option value="">no missions</option>'}</select>
      <span id="m-tabs">
        <button data-tab="votes_p1" class="primary">P1 votes</button>
        <button data-tab="votes_p2">P2 votes</button>
        <button data-tab="posts">Posts</button>
        <button data-tab="transactions">Transactions</button>
      </span>
      <input id="m-ben" placeholder="ben_id (optional)" size="12" />
      <input id="m-limit" type="number" value="200" min="1" max="500" style="width:74px" title="limit" />
      <button class="primary" id="m-run">Run</button>
      <span class="count" id="rowcount"></span>
    </div>
    <div id="m-summary" class="msg" style="padding:6px 0;text-align:left;"></div>
    <div id="grid"><div class="msg">Pick a mission and a tab.</div></div>`;
  const tabs = $("#m-tabs");
  tabs.querySelectorAll("button").forEach((b) => b.onclick = () => {
    current.tab = b.dataset.tab;
    tabs.querySelectorAll("button").forEach((x) => x.classList.toggle("primary", x === b));
    runMissionView();
  });
  $("#m-run").onclick = runMissionView;
  $("#m-mission").onchange = runMissionView;
  $("#m-ben").addEventListener("keydown", (e) => { if (e.key === "Enter") runMissionView(); });
  if (missions.length) runMissionView();
}

async function runMissionView() {
  const mission = $("#m-mission").value.trim();
  const ben = $("#m-ben").value.trim();
  const tab = (current && current.tab) || "votes_p1";
  if (!mission) { $("#grid").innerHTML = `<div class="msg">No mission selected.</div>`; return; }
  const idKey = tab === "posts" ? "ben_author_id" : "ben_id";
  const filters = { mission_id: mission };
  if (ben) filters[idKey] = ben;
  const limit = parseInt($("#m-limit").value) || 200;
  $("#grid").innerHTML = `<div class="msg">Running…</div>`;
  try {
    const rows = await api("/admin/query/run", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ entity: tab, filters, limit }),
    });
    const users = new Set(rows.map((r) => r[idKey]).filter((v) => v != null));
    $("#m-summary").textContent =
      `${tab} · mission ${mission}${ben ? " · ben " + ben : ""} — ${rows.length} rows, ${users.size} distinct user(s)`;
    renderGrid(rows);
  } catch (err) { $("#grid").innerHTML = `<div class="msg warn">${err.message}</div>`; }
}
document.querySelector('[data-view="mission"]').onclick = selectMissionView;

// ---------- start ----------
if (token) { hideLogin(); boot(); } else { showLogin(); }
</script>
</body>
</html>
